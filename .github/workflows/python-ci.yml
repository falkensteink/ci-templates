name: Python CI

on:
  workflow_call:
    secrets:
      BIRDMUG_AUTH_READ:
        description: |
          Optional PAT (fine-grained, Contents:Read on falkensteink/birdmug-auth) for
          repos whose requirements pin the `birdmug-auth-client` subpackage via
          `git+https://github.com/falkensteink/birdmug-auth@<sha>#subdirectory=client`.
          When set, a git-config step translates https://github.com/ clones to use
          this token. When unset (public-deps-only consumers), the step is a no-op.
        required: false
    inputs:
      python-version:
        type: string
        default: "3.12"
      working-directory:
        description: "Directory containing source and tests (relative to repo root)"
        type: string
        default: "."
      requirements-file:
        description: "Path to requirements file (relative to repo root)"
        type: string
        default: "requirements.txt"
      requirements-dev-file:
        description: "Optional separate dev requirements file"
        type: string
        default: ""
      lint-paths:
        description: "Space-separated paths to lint (relative to working-directory)"
        type: string
        default: "."
      test-command:
        description: "Command to run tests (executed in working-directory)"
        type: string
        default: "pytest -q"
      has-tests:
        description: "Set to false to skip the test job"
        type: boolean
        default: true
      services-postgres:
        description: "Spin up a PostgreSQL 16 service container for tests"
        type: boolean
        default: false
      db-test-host:
        description: "DB host for tests (only when services-postgres is true)"
        type: string
        default: "localhost"
      db-test-port:
        description: "DB port for tests"
        type: string
        default: "5432"
      db-user:
        description: "Postgres user for service container"
        type: string
        default: "testuser"
      db-password:
        description: "Postgres password for service container"
        type: string
        default: "testpass"
      db-name:
        description: "Postgres database name for service container"
        type: string
        default: "testdb"
      audit-ignore-ids:
        description: "Space-separated CVE/GHSA IDs to ignore in pip-audit (e.g. 'CVE-2025-71176 GHSA-xyz')"
        type: string
        default: ""

# Cancel an in-progress run when a fresher push to the same ref arrives.
# Saves GHA minutes during push-fix-push loops (2026-04-29 minute crunch).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        working-directory: ${{ inputs.working-directory }}
        run: ruff check ${{ inputs.lint-paths }}
      - name: Ruff format check
        working-directory: ${{ inputs.working-directory }}
        run: ruff format --check ${{ inputs.lint-paths }}

  test:
    name: Tests
    if: ${{ inputs.has-tests }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ${{ inputs.services-postgres && 'postgres:16-alpine' || '' }}
        env:
          POSTGRES_USER: ${{ inputs.db-user }}
          POSTGRES_PASSWORD: ${{ inputs.db-password }}
          POSTGRES_DB: ${{ inputs.db-name }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ inputs.db-user }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_TEST_HOST: ${{ inputs.db-test-host }}
      DB_TEST_PORT: ${{ inputs.db-test-port }}
      ENVIRONMENT: development
      BIRDMUG_JWT_SECRET: dev-secret-change-in-prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - name: Configure git for private-repo deps (if BIRDMUG_AUTH_READ provided)
        env:
          BIRDMUG_AUTH_READ: ${{ secrets.BIRDMUG_AUTH_READ }}
        run: |
          if [ -n "$BIRDMUG_AUTH_READ" ]; then
            git config --global url."https://x-access-token:${BIRDMUG_AUTH_READ}@github.com/".insteadOf "https://github.com/"
            echo "Configured git to use BIRDMUG_AUTH_READ for github.com clones."
          else
            echo "No BIRDMUG_AUTH_READ secret passed; skipping git config (public deps only)."
          fi
      - name: Install dependencies
        run: |
          if [ -n "${{ inputs.requirements-dev-file }}" ]; then
            pip install -r ${{ inputs.requirements-dev-file }}
          else
            pip install -r ${{ inputs.requirements-file }}
          fi
      - name: Run tests
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.test-command }}
      - name: Upload coverage
        if: always() && hashFiles('**/coverage.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: "**/coverage.xml"

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - name: Configure git for private-repo deps (if BIRDMUG_AUTH_READ provided)
        env:
          BIRDMUG_AUTH_READ: ${{ secrets.BIRDMUG_AUTH_READ }}
        run: |
          if [ -n "$BIRDMUG_AUTH_READ" ]; then
            git config --global url."https://x-access-token:${BIRDMUG_AUTH_READ}@github.com/".insteadOf "https://github.com/"
          fi
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit dependencies
        run: |
          IGNORE_FLAGS=""
          for id in ${{ inputs.audit-ignore-ids }}; do
            IGNORE_FLAGS="$IGNORE_FLAGS --ignore-vuln $id"
          done
          pip-audit -r ${{ inputs.requirements-file }} $IGNORE_FLAGS
