name: E2E Tests

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment: prod or staging"
        type: string
        default: "prod"

# Cancel an in-progress E2E run when a fresher push to the same ref arrives.
# Saves GHA minutes during push-fix-push loops (2026-04-29 minute crunch).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Tests (${{ inputs.environment }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          repository: falkensteink/ci-templates
          sparse-checkout: |
            scripts/e2e-tests.sh

      - name: Run E2E tests
        run: |
          chmod +x scripts/e2e-tests.sh
          scripts/e2e-tests.sh "${{ inputs.environment }}"
