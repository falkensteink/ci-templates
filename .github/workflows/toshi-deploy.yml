name: Toshi Deploy

on:
  workflow_call:
    inputs:
      repo-name:
        description: "Repository name as it appears in deploy.sh REPO_DIR (e.g., NPC-PM, Spellstorm)"
        type: string
        required: true
      branch:
        description: "Branch to deploy"
        type: string
        default: "main"
    secrets:
      TOSHI_DEPLOY_SECRET:
        description: "GitHub webhook secret for toshi-bot verification"
        required: true

# Queue concurrent deploys instead of cancelling — half-deployed Toshi
# state is worse than waiting. cancel-in-progress=false means a second
# push lines up behind the running deploy and starts after it finishes.
concurrency:
  group: ${{ github.workflow }}-${{ inputs.repo-name }}-${{ inputs.branch }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Toshi
    runs-on: ubuntu-latest
    steps:
      - name: Trigger toshi-bot deploy
        env:
          WEBHOOK_SECRET: ${{ secrets.TOSHI_DEPLOY_SECRET }}
          REPO_NAME: ${{ inputs.repo-name }}
          BRANCH: ${{ inputs.branch }}
        run: |
          # Build a GitHub push-style payload that toshi-bot expects
          PAYLOAD="{\"ref\":\"refs/heads/${BRANCH}\",\"repository\":{\"name\":\"${REPO_NAME}\"},\"pusher\":{\"name\":\"github-actions\"}}"

          # Sign the payload with HMAC SHA-256 (same as GitHub webhooks)
          SIGNATURE="sha256=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/^.* //')"

          echo "Deploying $REPO_NAME ($BRANCH) via toshi-bot webhook..."
          echo "Payload length: ${#PAYLOAD}"
          echo "Signature prefix: ${SIGNATURE:0:20}..."

          # POST to toshi-bot
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://bot.birdmug.com/github" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "Toshi-bot responded with HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Deploy trigger failed!"
            exit 1
          fi
          echo "Deploy triggered successfully"
