name: Toshi Deploy

on:
  workflow_call:
    inputs:
      repo-name:
        description: "Repository name as it appears in deploy.sh REPO_DIR (e.g., NPC-PM, Spellstorm)"
        type: string
        required: true
      branch:
        description: "Branch to deploy"
        type: string
        default: "main"
    secrets:
      TOSHI_DEPLOY_SECRET:
        description: "GitHub webhook secret for toshi-bot verification"
        required: true

jobs:
  deploy:
    name: Deploy to Toshi
    runs-on: ubuntu-latest
    steps:
      - name: Trigger toshi-bot deploy
        env:
          WEBHOOK_SECRET: ${{ secrets.TOSHI_DEPLOY_SECRET }}
          REPO_NAME: ${{ inputs.repo-name }}
          BRANCH: ${{ inputs.branch }}
        run: |
          # Build a GitHub push-style payload that toshi-bot expects
          PAYLOAD=$(cat <<JSONEOF
          {
            "ref": "refs/heads/${BRANCH}",
            "repository": { "name": "${REPO_NAME}" },
            "pusher": { "name": "github-actions" }
          }
          JSONEOF
          )

          # Sign the payload with HMAC SHA-256 (same as GitHub webhooks)
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')"

          # POST to toshi-bot
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://bot.birdmug.com/github" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD")

          echo "Toshi-bot responded with HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Deploy trigger failed!"
            exit 1
          fi
          echo "Deploy triggered for $REPO_NAME ($BRANCH)"
